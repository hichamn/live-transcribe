<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 220px; padding: 16px; font-family: -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; }
    button { width: 100%; padding: 10px; background: #e94560; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: #c73e54; }
    p { font-size: 12px; color: #8899aa; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <button id="open">Open Live Transcribe</button>
  <p>Opens in a separate window</p>
  <script>
    document.getElementById('open').addEventListener('click', () => {
      chrome.runtime.sendMessage({ action: 'openWindow' });
      window.close();
    });
  </script>
</body>
</html>
