<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Transcribe</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Settings bar -->
  <div id="settings-bar">
    <div class="settings-row">
      <input type="password" id="deepgram-key" placeholder="Deepgram API Key (free at deepgram.com)" />
      <button id="save-keys" title="Save Keys">Save</button>
    </div>
    <div class="settings-row">
      <input type="password" id="claude-key" placeholder="Claude API Key (sk-ant-...)" />
    </div>
    <div class="settings-row">
      <label>
        <input type="checkbox" id="auto-answer" checked />
        Auto-answer questions
      </label>
      <label>
        Language:
        <select id="language">
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="ar">Arabic</option>
          <option value="de">German</option>
          <option value="multi">Multi (auto-detect)</option>
        </select>
      </label>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button id="toggle-btn" class="start">Start Transcribing</button>
    <span id="status">Ready</span>
  </div>

  <!-- Info banner -->
  <div id="info-banner" style="display:none">
    When the picker appears, select a <b>Chrome Tab</b> or <b>Entire Screen</b>.<br>
    Make sure <b>"Share audio"</b> is checked at the bottom!
  </div>

  <!-- Transcript -->
  <div id="transcript-container">
    <h3>Live Transcript</h3>
    <div id="transcript"></div>
    <div id="interim" class="interim"></div>
  </div>

  <!-- AI Answers -->
  <div id="answers-container">
    <h3>AI Answers</h3>
    <div id="answers"></div>
  </div>

  <!-- Manual question -->
  <div id="ask-bar">
    <input type="text" id="manual-question" placeholder="Ask about the conversation..." />
    <button id="ask-btn">Ask</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
